# go-librespot (Spotify Connect) for Beocreate
# Location on the Pi: /home/pi/.config/go-librespot/config.yml (owner: pi)
#
# VOLUME SAFETY: The actual (analog) volume is controlled solely by the DSP
# master (ALSA "DSPVolume" / DSP register 106) via the Beocreate UI.
# go-librespot's own volume is ONLY an additional digital attenuation
# (external_volume/mixer are deliberately NOT used), so a phone connected via
# Spotify can NEVER drive the hardware volume up. ignore_last_volume=true +
# a low initial_volume => every new connection starts quietly.

device_name: Beocreate
device_type: speaker

audio_backend: alsa
# plughw automatically converts Spotify's 44.1 kHz to the device/DSP rate (48 kHz).
audio_device: plughw:CARD=sndrpihifiberry

bitrate: 320            # 320 kbit/s (Spotify Premium only; otherwise falls back)
volume_steps: 100
initial_volume: 40      # digital starting volume (in addition to the DSP master)
ignore_last_volume: true
external_volume: false  # no mixer coupling -> the DSP master remains the sole control

zeroconf_enabled: true  # always discoverable in Spotify "Connect"
# Register via the running avahi-daemon (instead of the built-in mDNS responder) —
# avoids the 5353 conflict with avahi/beocreate-dnssd2. This is what actually makes
# the device visible in the Spotify app.
zeroconf_backend: avahi

server:                 # local control/event API for the bridge (-> shim :81)
  enabled: true
  address: localhost
  port: 3678
